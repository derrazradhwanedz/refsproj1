# Optional: used when this file is non-empty. Run app from project root so paths resolve.
# Override level per logger if needed. Default file: logs/app.log

[loggers]
keys=root,refsproj1

[handlers]
keys=console,file

[formatters]
keys=std

[logger_root]
level=WARNING
handlers=console
qualname=

[logger_refsproj1]
level=DEBUG
handlers=console,file
qualname=refsproj1
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=std
args=(sys.stderr,)

[handler_file]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=std
args=('logs/app.log', 'a', 1048576, 5, 'utf-8')

[formatter_std]
format=%(asctime)s | %(levelname)-8s | %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
